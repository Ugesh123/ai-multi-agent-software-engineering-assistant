server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: any non-file route falls back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container. "backend" resolves via
    # Docker Compose's internal DNS (see docker-compose.yml).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE streaming (GET /runs/{id}/stream) needs buffering disabled
        # and a long read timeout so events flush to the client immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
